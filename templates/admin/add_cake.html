{% extends 'admin_commonfile.html' %}

{% block title %}Add Cake{% endblock %}

{% block content %}
<div class="container">
    <h2>Add a New Cake</h2>
    <form action="/admin/add_cake" method="POST" enctype="multipart/form-data">
        <label for="categoryname">Category Name:</label>
        <input type="text" id="categoryname" name="categoryname" required><br><br>

        <label for="name">Cake Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description"></textarea><br><br>

        <label for="size">Size:</label>
        <select id="size" name="size" required>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
        </select><br><br>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" step="0.01" required><br><br>

        <label for="image">Image:</label>
        <input type="file" id="image" name="image" accept="image/*" required><br><br>

        <label for="availability">Availability:</label>
        <select id="availability" name="availability" required>
            <option value="Available">Available</option>
            <option value="Out of Stock">Out of Stock</option>
        </select><br><br>

        <input type="submit" value="Add Cake">
    <a href="/admin/view_cakes">View Cakes</a>

    </form>

</div>
{% endblock %}
